name: Clone Dockerfile
on:
#  push:
#    branches: [ main ]
#    paths:
#      - 'Dockerfile'
#      - 'index.js'
#      - 'package.json'
#  pull_request:
#    branches: [ main ]
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Clone Dockerfile
        run: |
          wget -O Dockerfile https://raw.githubusercontent.com/opendatalab/MinerU/refs/heads/master/docker/global/Dockerfile

      - name: Delete model download
        run: sed -i '\|RUN /bin/bash -c "mineru-models-download -s huggingface -m all"|d' Dockerfile
        
      - name: Clone for app
        run: cp Dockerfile ./app/Dockerfile
        
      - name: Change base image
        run: sed -i '1c\FROM python:3.10-slim' ./app/Dockerfile
        
      - name: Change base image
        run: sed -i '16a\RUN python3 -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu --no-cache-dir --break-system-packages' ./app/Dockerfile
        
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: ':arrow_up: update latest mineru dockerfile'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          push_options: '--set-upstream'

